<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0a0a1a;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      cursor: none;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 10;
    }

    h1 {
      font-size: 5rem;
      font-weight: 900;
      background: linear-gradient(90deg, #f953c6, #b91d73, #4776e6, #f953c6);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shine 4s linear infinite, pop-in 0.8s ease-out;
      letter-spacing: 4px;
      text-transform: uppercase;
      filter: drop-shadow(0 0 20px rgba(249, 83, 198, 0.5));
    }

    .subtitle {
      margin-top: 16px;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 8px;
      text-transform: uppercase;
      animation: fade-in 1.2s ease-out forwards;
    }

    @keyframes shine {
      to { background-position: 300% center; }
    }
    @keyframes pop-in {
      0% { transform: scale(0.5); opacity: 0; }
      80% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 0.4; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div class="container">
    <h1>Hello, World!</h1>
    <p class="subtitle">Welcome to my page</p>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    const COLORS = [
      '#ff4ecd', '#ff6b6b', '#ffd93d', '#6bcb77',
      '#4d96ff', '#c77dff', '#ff9a3c', '#00f5d4'
    ];

    // ── 마우스 트레일 ──────────────────────────────
    let mouse = { x: -999, y: -999 };
    const trail = [];

    window.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;

      // 마우스 이동 시 작은 스파크 생성
      for (let i = 0; i < 3; i++) {
        trail.push({
          x: mouse.x,
          y: mouse.y,
          vx: (Math.random() - 0.5) * 3,
          vy: (Math.random() - 0.5) * 3 - 1,
          alpha: 1,
          size: Math.random() * 4 + 2,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          life: 1
        });
      }
    });

    // 마우스 클릭 시 폭죽
    window.addEventListener('click', e => {
      launchFirework(e.clientX, e.clientY);
    });

    // ── 폭죽 파티클 ───────────────────────────────
    const fireworks = [];

    function launchFirework(x, y) {
      const count = 80 + Math.floor(Math.random() * 40);
      const color1 = COLORS[Math.floor(Math.random() * COLORS.length)];
      const color2 = COLORS[Math.floor(Math.random() * COLORS.length)];

      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
        const speed = Math.random() * 6 + 2;
        fireworks.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          alpha: 1,
          size: Math.random() * 4 + 1,
          color: Math.random() > 0.5 ? color1 : color2,
          gravity: 0.12,
          decay: Math.random() * 0.015 + 0.012,
          tail: []
        });
      }
    }

    // ── 자동 폭죽 ─────────────────────────────────
    function autoFirework() {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height * 0.6;
      launchFirework(x, y);
    }

    setInterval(autoFirework, 1200);
    setTimeout(() => { launchFirework(canvas.width / 2, canvas.height / 2); }, 300);

    // ── 커서 그리기 ───────────────────────────────
    function drawCursor() {
      ctx.save();
      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, 8, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, 14, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(249, 83, 198, 0.7)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    }

    // ── 메인 루프 ─────────────────────────────────
    function animate() {
      ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 트레일 업데이트
      for (let i = trail.length - 1; i >= 0; i--) {
        const t = trail[i];
        t.x += t.vx;
        t.y += t.vy;
        t.vy += 0.05;
        t.life -= 0.04;
        t.alpha = t.life;

        if (t.life <= 0) { trail.splice(i, 1); continue; }

        ctx.save();
        ctx.globalAlpha = t.alpha;
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.size * t.life, 0, Math.PI * 2);
        ctx.fillStyle = t.color;
        ctx.shadowColor = t.color;
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.restore();
      }

      // 폭죽 업데이트
      for (let i = fireworks.length - 1; i >= 0; i--) {
        const f = fireworks[i];

        f.tail.push({ x: f.x, y: f.y });
        if (f.tail.length > 5) f.tail.shift();

        f.x += f.vx;
        f.y += f.vy;
        f.vy += f.gravity;
        f.vx *= 0.98;
        f.alpha -= f.decay;

        if (f.alpha <= 0) { fireworks.splice(i, 1); continue; }

        // 꼬리
        for (let j = 0; j < f.tail.length; j++) {
          const ratio = j / f.tail.length;
          ctx.save();
          ctx.globalAlpha = f.alpha * ratio * 0.4;
          ctx.beginPath();
          ctx.arc(f.tail[j].x, f.tail[j].y, f.size * ratio, 0, Math.PI * 2);
          ctx.fillStyle = f.color;
          ctx.fill();
          ctx.restore();
        }

        // 파티클 본체
        ctx.save();
        ctx.globalAlpha = f.alpha;
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
        ctx.fillStyle = f.color;
        ctx.shadowColor = f.color;
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.restore();
      }

      drawCursor();
      requestAnimationFrame(animate);
    }

    animate();
  </script>

</body>
</html>
